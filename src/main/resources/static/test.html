<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>
<body>
<input id="token" placeholder="액세스 토큰 입력" style="width:400px"/>
<button onclick="connect()">연결</button>
<div id="log"></div>

<script>
    let stompClient;

    function connect() {
        const token = document.getElementById('token').value;
        const socket = new SockJS('http://localhost:8080/ws-talkie');
        stompClient = Stomp.over(socket);

        stompClient.connect({'Authorization': 'Bearer ' + token}, function () {
            log('연결됨');
            stompClient.subscribe('/topic/rooms/1', function (message) {
                log('받은 메시지: ' + message.body);
            });
            stompClient.send('/app/rooms/1/send', {}, JSON.stringify({content: '안녕!'}));
        }, function (error) {
            log('연결 실패: ' + error);
        });
    }

    function log(msg) {
        document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
    }
</script>
</body>
</html>
